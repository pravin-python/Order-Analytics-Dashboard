{% extends "theme.html" %}

{% block title %}Change Password — OrderPulse{% endblock %}
{% block breadcrumb %}Change Password{% endblock %}

{% block content %}
<div class="profile-container">
    <div class="profile-form-card glass-card">
        <h3>Change Password</h3>
        <form id="changePasswordForm" class="auth-form">
            <div class="auth-input-group">
                <span class="material-icons-round auth-input-icon">lock_open</span>
                <input type="password" id="oldPassword" class="auth-input" placeholder="Current Password" required>
                <button type="button" class="auth-toggle-pw" onclick="togglePassword('oldPassword', this)">
                    <span class="material-icons-round">visibility_off</span>
                </button>
            </div>

            <div class="auth-input-group">
                <span class="material-icons-round auth-input-icon">lock</span>
                <input type="password" id="newPassword" class="auth-input" placeholder="New Password (min 6 chars)" required minlength="6">
                <button type="button" class="auth-toggle-pw" onclick="togglePassword('newPassword', this)">
                    <span class="material-icons-round">visibility_off</span>
                </button>
            </div>

            <div class="auth-input-group">
                <span class="material-icons-round auth-input-icon">lock</span>
                <input type="password" id="confirmNewPassword" class="auth-input" placeholder="Confirm New Password" required minlength="6">
            </div>

            <div class="profile-actions">
                <button type="submit" class="btn btn-primary" id="changePassBtn">
                    <span class="material-icons-round">check_circle</span>
                    Update Password
                </button>
                <a href="/auth/profile" class="btn btn-secondary">
                    <span class="material-icons-round">arrow_back</span>
                    Back to Profile
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
