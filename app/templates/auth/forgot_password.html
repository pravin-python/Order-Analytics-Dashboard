{% extends "base.html" %}

{% block title %}Forgot Password — OrderPulse{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="auth-bg-orb auth-bg-orb-1"></div>
    <div class="auth-bg-orb auth-bg-orb-2"></div>
    <div class="auth-bg-orb auth-bg-orb-3"></div>

    <div class="auth-card glass-card">
        <div class="auth-logo">
            <span class="material-icons-round logo-icon" style="font-size:36px;">lock_reset</span>
        </div>
        <p class="auth-subtitle">Enter your email to receive a reset link</p>

        <form id="forgotForm" class="auth-form">
            <div class="auth-input-group">
                <span class="material-icons-round auth-input-icon">email</span>
                <input type="email" id="forgotEmail" class="auth-input" placeholder="Email address" required>
            </div>

            <button type="submit" class="btn btn-primary auth-btn" id="forgotBtn">
                <span class="material-icons-round">send</span>
                Send Reset Link
            </button>
        </form>

        <div class="auth-footer">
            <a href="/auth/login" class="auth-link">← Back to Login</a>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
