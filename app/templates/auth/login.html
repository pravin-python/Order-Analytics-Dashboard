{% extends "base.html" %}

{% block title %}Login — OrderPulse{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% endblock %}

{% block body %}
<div class="auth-page">
    <!-- Animated Background Orbs -->
    <div class="auth-bg-orb auth-bg-orb-1"></div>
    <div class="auth-bg-orb auth-bg-orb-2"></div>
    <div class="auth-bg-orb auth-bg-orb-3"></div>

    <div class="auth-card glass-card">
        <!-- Logo -->
        <div class="auth-logo">
            <span class="material-icons-round logo-icon" style="font-size:36px;">monitoring</span>
            <span class="logo-text" style="font-size:1.5rem;">OrderPulse</span>
        </div>
        <p class="auth-subtitle">Sign in to your dashboard</p>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form" autocomplete="on">
            <div class="auth-input-group">
                <span class="material-icons-round auth-input-icon">email</span>
                <input type="email" id="loginEmail" class="auth-input" placeholder="Email address" required autocomplete="email">
            </div>

            <div class="auth-input-group">
                <span class="material-icons-round auth-input-icon">lock</span>
                <input type="password" id="loginPassword" class="auth-input" placeholder="Password" required autocomplete="current-password">
                <button type="button" class="auth-toggle-pw" onclick="togglePassword('loginPassword', this)">
                    <span class="material-icons-round">visibility_off</span>
                </button>
            </div>

            <div class="auth-options">
                <label class="auth-checkbox">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="/auth/forgot-password" class="auth-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-primary auth-btn" id="loginBtn">
                <span class="material-icons-round">login</span>
                Sign In
            </button>
        </form>

        <div class="auth-footer">
            <span>Don't have an account?</span>
            <a href="/auth/register" class="auth-link">Create one</a>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
