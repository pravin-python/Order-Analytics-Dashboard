{% extends "base.html" %}

{% block title %}Register — OrderPulse{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="auth-bg-orb auth-bg-orb-1"></div>
    <div class="auth-bg-orb auth-bg-orb-2"></div>
    <div class="auth-bg-orb auth-bg-orb-3"></div>

    <div class="auth-card glass-card">
        <div class="auth-logo">
            <span class="material-icons-round logo-icon" style="font-size:36px;">monitoring</span>
            <span class="logo-text" style="font-size:1.5rem;">OrderPulse</span>
        </div>
        <p class="auth-subtitle">Create your account</p>

        <form id="registerForm" class="auth-form" autocomplete="on">
            <div class="auth-input-group">
                <span class="material-icons-round auth-input-icon">person</span>
                <input type="text" id="regName" class="auth-input" placeholder="Full Name" required autocomplete="name">
            </div>

            <div class="auth-input-group">
                <span class="material-icons-round auth-input-icon">email</span>
                <input type="email" id="regEmail" class="auth-input" placeholder="Email address" required autocomplete="email">
            </div>

            <div class="auth-input-group">
                <span class="material-icons-round auth-input-icon">lock</span>
                <input type="password" id="regPassword" class="auth-input" placeholder="Password (min 6 chars)" required minlength="6" autocomplete="new-password">
                <button type="button" class="auth-toggle-pw" onclick="togglePassword('regPassword', this)">
                    <span class="material-icons-round">visibility_off</span>
                </button>
            </div>

            <div class="auth-input-group">
                <span class="material-icons-round auth-input-icon">lock</span>
                <input type="password" id="regConfirm" class="auth-input" placeholder="Confirm Password" required minlength="6" autocomplete="new-password">
            </div>

            <button type="submit" class="btn btn-primary auth-btn" id="registerBtn">
                <span class="material-icons-round">person_add</span>
                Create Account
            </button>
        </form>

        <div class="auth-footer">
            <span>Already have an account?</span>
            <a href="/auth/login" class="auth-link">Sign in</a>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
