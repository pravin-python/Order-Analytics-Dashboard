{% extends "base.html" %}

{% block title %}Reset Password — OrderPulse{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="auth-bg-orb auth-bg-orb-1"></div>
    <div class="auth-bg-orb auth-bg-orb-2"></div>
    <div class="auth-bg-orb auth-bg-orb-3"></div>

    <div class="auth-card glass-card">
        <div class="auth-logo">
            <span class="material-icons-round logo-icon" style="font-size:36px;">lock_reset</span>
        </div>
        <p class="auth-subtitle">Set your new password</p>

        <form id="resetForm" class="auth-form">
            <input type="hidden" id="resetToken" value="{{ token }}">

            <div class="auth-input-group">
                <span class="material-icons-round auth-input-icon">lock</span>
                <input type="password" id="resetPassword" class="auth-input" placeholder="New Password (min 6 chars)" required minlength="6">
                <button type="button" class="auth-toggle-pw" onclick="togglePassword('resetPassword', this)">
                    <span class="material-icons-round">visibility_off</span>
                </button>
            </div>

            <div class="auth-input-group">
                <span class="material-icons-round auth-input-icon">lock</span>
                <input type="password" id="resetConfirm" class="auth-input" placeholder="Confirm New Password" required minlength="6">
            </div>

            <button type="submit" class="btn btn-primary auth-btn" id="resetBtn">
                <span class="material-icons-round">check_circle</span>
                Reset Password
            </button>
        </form>

        <div class="auth-footer">
            <a href="/auth/login" class="auth-link">← Back to Login</a>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
