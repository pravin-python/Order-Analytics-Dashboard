<!-- Charts Component -->

<!-- Bar Chart: Dispatch Time Analysis -->
<div class="chart-card glass-card">
    <div class="chart-header">
        <h3>Dispatch Time Analysis</h3>
        <div class="chart-legend">
            <span class="legend-item"><span class="legend-dot" style="background: var(--tertiary);"></span> Within 24h</span>
            <span class="legend-item"><span class="legend-dot" style="background: var(--warning);"></span> Beyond 24h</span>
        </div>
    </div>
    <div class="chart-body">
        <canvas id="barChart"></canvas>
    </div>
</div>

<!-- Donut Chart: Store Distribution -->
<div class="chart-card glass-card">
    <div class="chart-header">
        <h3>Store Distribution</h3>
        <span class="chart-subtitle">Orders by store prefix</span>
    </div>
    <div class="chart-body chart-body-donut">
        <canvas id="donutChart"></canvas>
    </div>
</div>
