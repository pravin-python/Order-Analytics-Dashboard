{% extends "base.html" %}

{% block body %}
<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo">
            <span class="material-icons-round logo-icon">monitoring</span>
            <span class="logo-text">OrderPulse</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
            <span class="material-icons-round">menu</span>
        </button>
    </div>

    <nav class="sidebar-nav">
        <a href="/" class="nav-item {% if request.endpoint == 'main.dashboard' %}active{% endif %}" id="nav-dashboard">
            <span class="material-icons-round">dashboard</span>
            <span class="nav-text">Dashboard</span>
        </a>
        <a href="/settings" class="nav-item {% if request.endpoint == 'main.settings' %}active{% endif %}" id="nav-settings">
            <span class="material-icons-round">settings</span>
            <span class="nav-text">Settings</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="connection-status" id="connectionStatus">
            <span class="material-icons-round status-icon">circle</span>
            <span class="nav-text status-text">Disconnected</span>
        </div>
    </div>
</aside>

<!-- Main Layout -->
<div class="main-layout" id="mainLayout">
    <!-- Top Navbar -->
    <header class="top-navbar">
        <div class="navbar-left">
            <div class="breadcrumb">
                <span class="material-icons-round">home</span>
                <span>/</span>
                <span class="breadcrumb-current">{% block breadcrumb %}Dashboard{% endblock %}</span>
            </div>
        </div>
        <div class="navbar-right">
            <button class="icon-btn" id="darkModeToggle" title="Toggle Theme">
                <span class="material-icons-round">dark_mode</span>
            </button>
            <button class="icon-btn" id="notifBtn" title="Notifications">
                <span class="material-icons-round">notifications</span>
                <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
            </button>
            <div class="user-avatar" title="User">
                <span class="material-icons-round">person</span>
            </div>
        </div>
    </header>

    <!-- Page Content -->
    <main class="content-area">
        {% block content %}{% endblock %}
    </main>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Order Detail Modal -->
{% include 'components/modals.html' %}
{% endblock %}
